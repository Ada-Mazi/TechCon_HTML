<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TechCon 2024</title>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="schedule.html">Schedule</a>
            <a href="register.html">Register</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p>Email: <a href="mailto:email@example.com">email@example.com</a></p>
            
            <h3>Follow Us on Social Media</h3>
            <p>
                <a href="https://twitter.com/techcon" target="_blank">Twitter</a> | 
                <a href="https://linkedin.com/company/techcon" target="_blank">LinkedIn</a> | 
                <a href="https://facebook.com/techcon" target="_blank">Facebook</a> | 
                <a href="https://instagram.com/techcon" target="_blank">Instagram</a>
            </p>
        </section>

        <section>
            <h2>Conference Venue</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3024.177631294649!2d-74.00594908459418!3d40.71274397932981!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25a1e7e56a56f%3A0xcb5b68b37ed28ff0!2sTimes%20Square%2C%20New%20York%2C%20NY%2010036%2C%20USA!5e0!3m2!1sen!2s!4v1234567890123" 
                width="600" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy"
                title="TechCon 2024 Conference Location">
            </iframe>
        </section>

        <section>
            <h2>Send us a Message</h2>
            <form action="#" method="post">
                <div>
                    <label for="name">Your Name:</label><br>
                    <input type="text" id="name" name="name" required>
                </div>
                <br>
                
                <div>
                    <label for="contact-email">Your Email:</label><br>
                    <input type="email" id="contact-email" name="contact-email" required>
                </div>
                <br>
                
                <div>
                    <label for="message">Your Message:</label><br>
                    <textarea id="message" name="message" rows="5" cols="50" required></textarea>
                </div>
                <br>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 TechCon Conference. All rights reserved.</p>
    </footer>
</body>
</html>
